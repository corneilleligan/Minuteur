<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Minuteur</title>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="wrapper">

  <p class="label-top">Minuteur</p>

  <div class="clock-wrap">
    <svg class="face-svg" viewBox="0 0 300 300">
      <circle class="track" cx="150" cy="150" r="120"/>
      <circle class="progress" cx="150" cy="150" r="120" id="progressArc"/>
    </svg>
    <div class="inner">
      <span class="time-display" id="timerDisp">01:00</span>
      <span class="time-label">restantes</span>
    </div>
  </div>

  <div class="duration-wrap">
    <button class="dur-btn" data-sec="30">30s</button>
    <button class="dur-btn active" data-sec="60">1 min</button>
    <button class="dur-btn" data-sec="180">3 min</button>
    <button class="dur-btn" data-sec="300">5 min</button>
    <button class="dur-btn" data-sec="600">10 min</button>
  </div>

  <div class="controls">
    <button class="btn-secondary" id="resetBtn">Réinitialiser</button>
    <button class="btn-play" id="playBtn">Démarrer</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
